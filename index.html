<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prévia — Ajustes com Accordion</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>



    /* ═══════════════════════════════════════════
       CSS VARIABLES – LIGHT & DARK
    ═══════════════════════════════════════════ */
    :root {
  --font-display: 'Clash Display', sans-serif;
  --font-body: 'Plus Jakarta Sans', sans-serif;
      --bg:        #f0f4f8;
      --surface:   #ffffff;
      --surface2:  #f8fafc;
      --border:    #e2e8f0;
      --border2:   #cbd5e1;
      --txt:       #0f172a;
      --txt2:      #475569;
      --txt3:      #94a3b8;
      --accent:    #2563eb;
      --accent2:   #f97316;
      --accent-g:  linear-gradient(135deg,#2563eb,#1d4ed8);
      --accent2-g: linear-gradient(135deg,#f97316,#ea580c);
      --header-bg: #0f172a;
      --card-accent: #2563eb;
      --shadow:    0 4px 20px rgba(0,0,0,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
      --radius:    18px;
      --radius-sm: 10px;
      --input-bg:  #f8fafc;
    }
    [data-theme="dark"] {
      --bg:        #090d17;
      --surface:   #111827;
      --surface2:  #162032;
      --border:    #1e2d45;
      --border2:   #243552;
      --txt:       #f1f5f9;
      --txt2:      #94a3b8;
      --txt3:      #475569;
      --accent:    #3b82f6;
      --accent2:   #f97316;
      --accent-g:  linear-gradient(135deg,#3b82f6,#2563eb);
      --accent2-g: linear-gradient(135deg,#f97316,#ea580c);
      --header-bg: #060b14;
      --card-accent:#3b82f6;
      --shadow:    0 4px 24px rgba(0,0,0,.4);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.6);
      --input-bg:  #0f172a;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--txt);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
      user-select: none;
      transition: background .3s, color .3s;
      min-height: 100dvh;
    }
    input, textarea, select, .selectable { user-select: text; }
    input, select, textarea { font-size: 16px !important; font-family: 'DM Sans', sans-serif; }

    /* ═══════════════════════════════════════════
       LAYOUT SHELL
    ═══════════════════════════════════════════ */
    .app-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
    }
    @media(min-width:600px) {
      .app-shell { justify-content: center; padding: 24px; }
    }
    .app-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      position: relative;
      z-index: 10;
      transition: background .3s;
    }
    @media(min-width:600px) {
      .app-card {
        min-height: 0;
        border-radius: 28px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
      }
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    .app-header {
      background: var(--header-bg);
      padding: max(1.2rem, env(safe-area-inset-top)) 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    .app-header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(59,130,246,.25), transparent 70%);
      pointer-events: none;
    }
    .app-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .4;
    }
    .header-left { display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
    #headerLogoArea {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.12);
    }
    #headerLogoArea.show { display: flex; }
    #headerLogoImg { width: 100%; height: 100%; object-fit: contain; }
    .header-icon-badge {
      font-size: 10px; font-family: 'Syne', sans-serif;
      font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); display: flex; align-items: center; gap: 5px;
    }
    .bolt-pulse { animation: boltPulse 2s ease-in-out infinite; }
    @keyframes boltPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 800;
      color: #f1f5f9; letter-spacing: .04em;
      line-height: 1;
    }
    .header-title span { color: var(--accent); }
    .header-actions { display: flex; gap: 6px; position: relative; z-index: 1; }
    .header-btn {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #e2e8f0;
      transition: background .2s;
    }
    .header-btn:hover { background: rgba(255,255,255,.16); }

    /* ═══════════════════════════════════════════
       MAIN SCROLL BODY
    ═══════════════════════════════════════════ */
    .app-body {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      margin-top: -12px;
      position: relative;
      z-index: 20;
      padding: 20px 16px calc(env(safe-area-inset-bottom) + 80px);
      transition: background .3s;
    }
    .screen { display: none; }
    .screen.active { display: block; animation: slideUp .35s cubic-bezier(.16,1,.3,1); }
    @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

    /* ═══════════════════════════════════════════
       CARDS & INPUTS
    ═══════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: background .3s, border-color .3s;
    }
    .card-accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent-g);
      border-radius: 2px;
    }
    .card-accent-bar.orange { background: var(--accent2-g); }
    .card-accent-bar.green  { background: linear-gradient(180deg,#22c55e,#16a34a); }
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--accent); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .input-f {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      color: var(--txt);
      font-weight: 600;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .3s;
    }
    .input-f:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
    }
    .input-f::placeholder { color: var(--txt3); font-weight: 400; }
    .input-group { margin-bottom: 8px; }
    .input-label {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--txt3); margin-bottom: 4px; display: block;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .input-prefix {
      position: relative;
    }
    .input-prefix .prefix {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 11px; font-weight: 700; color: var(--txt3);
      pointer-events: none;
    }
    .input-prefix .input-f { padding-left: 32px; }
    .input-prefix .suffix {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 9px; font-weight: 700; color: var(--txt3);
      background: var(--surface2);
      padding: 2px 6px; border-radius: 6px;
      pointer-events: none;
    }
    .input-prefix .input-f.has-suffix { padding-right: 70px; }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      border: none; cursor: pointer; font-family: 'Syne', sans-serif;
      font-weight: 700; border-radius: var(--radius-sm);
      transition: all .2s; touch-action: manipulation;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      width: 100%; padding: 15px;
      background: var(--accent2-g);
      color: #fff; font-size: 15px; font-weight: 800;
      border-radius: var(--radius);
      box-shadow: 0 6px 24px rgba(249,115,22,.3);
      letter-spacing: .04em;
    }
    .btn-primary:hover { box-shadow: 0 8px 28px rgba(249,115,22,.45); }
    .btn-secondary {
      flex: 1; padding: 12px 8px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--txt2); font-size: 11px;
    }
    .btn-secondary:hover { background: var(--surface2); }
    .btn-accent {
      width: 100%; padding: 12px;
      background: var(--accent-g);
      color: #fff; font-size: 11px;
    }
    .btn-danger { color: #ef4444; }
    .btn-dashed {
      width: 100%; padding: 13px;
      background: transparent;
      border: 2px dashed var(--border2);
      color: var(--txt3); font-size: 11px;
      border-radius: var(--radius);
    }
    .btn-dashed:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,246,.04); }

    /* ═══════════════════════════════════════════
       SERVICE ROW
    ═══════════════════════════════════════════ */
    .service-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
      position: relative;
      animation: slideUp .3s ease;
      box-shadow: var(--shadow);
      transition: background .3s, border-color .3s;
    }
    .service-select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--txt);
      font-weight: 600;
      outline: none;
      margin-bottom: 8px;
      transition: background .3s, border-color .3s;
    }
    .service-select:focus { border-color: var(--accent); }
    .qty-control {
      display: flex; align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      overflow: hidden; width: 88px;
    }
    .qty-btn {
      width: 28px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: var(--txt2);
      cursor: pointer; background: transparent; border: none;
      transition: background .15s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-val {
      flex: 1; text-align: center;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--txt);
    }
    .del-btn {
      position: absolute; top: 10px; right: 10px;
      background: transparent; border: none; cursor: pointer;
      color: var(--txt3); padding: 4px;
      transition: color .2s;
    }
    .del-btn:hover { color: #ef4444; }

    /* ═══════════════════════════════════════════
       RESULTS SCREEN
    ═══════════════════════════════════════════ */
    .result-hero {
      background: var(--header-bg);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      margin-bottom: 12px;
    }
    .result-hero::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 140px; height: 140px;
      background: radial-gradient(circle, rgba(59,130,246,.2), transparent 70%);
    }
    .result-hero-label {
      font-family: 'Syne', sans-serif;
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em;
      color: var(--accent); margin-bottom: 8px;
    }
    .result-hero-value {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 10vw, 48px); font-weight: 800;
      color: #f1f5f9; letter-spacing: -.02em; line-height: 1;
      margin-bottom: 20px;
    }
    .result-mini-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; text-align: left;
    }
    .result-mini {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 12px; padding: 10px 12px;
    }
    .result-mini-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 3px; }
    .result-mini-val { font-size: 14px; font-weight: 700; }
    .result-mini-val.green { color: #4ade80; }
    .result-mini-val.red   { color: #f87171; }
    .result-stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 8px;
      text-align: center; box-shadow: var(--shadow);
      transition: background .3s;
    }
    .stat-card-icon { font-size: 16px; margin-bottom: 4px; }
    .stat-card-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: var(--txt3); margin-bottom: 2px; }
    .stat-card-val { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: var(--txt); }

    /* ═══════════════════════════════════════════
       ACCORDION (messages)
    ═══════════════════════════════════════════ */
    .accordion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      transition: background .3s;
    }
    .accordion-trigger {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px;
      background: var(--surface2);
      border: none; cursor: pointer; color: var(--txt);
      transition: background .2s;
    }
    .accordion-trigger:hover { background: var(--surface); }
    .accordion-trigger-label {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .accordion-num {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
    }
    .num-blue { background: rgba(59,130,246,.15); color: var(--accent); }
    .num-orange { background: rgba(249,115,22,.15); color: var(--accent2); }
    .num-green { background: rgba(34,197,94,.15); color: #22c55e; }
    .accordion-chevron {
      color: var(--txt3); font-size: 12px;
      transition: transform .3s;
    }
    .accordion.open .accordion-chevron { transform: rotate(180deg); }
    .accordion-body {
      max-height: 0; overflow: hidden;
      transition: max-height .35s cubic-bezier(.4,0,.2,1);
    }
    .accordion.open .accordion-body { max-height: 2000px; }
    .accordion-inner { padding: 14px; background: var(--surface2); border-top: 1px solid var(--border); }
    .msg-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: 'DM Sans', monospace;
      font-size: 12px; line-height: 1.6;
      color: var(--txt2); margin-bottom: 10px;
      white-space: pre-wrap;
      transition: background .3s;
    }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      display: none;
    }
    .modal-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
    .modal-sheet {
      position: absolute;
      inset-x: 0; bottom: 0;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 0 0 env(safe-area-inset-bottom);
      max-height: 92dvh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }
    @media(min-width:600px) {
      .modal-sheet {
        inset: auto;
        top: 50%; left: 50%;
        transform: translate(-50%,-50%) scale(.96);
        border-radius: 24px;
        width: 100%; max-width: 440px;
        max-height: 88dvh;
        opacity: 0;
        transition: transform .3s cubic-bezier(.16,1,.3,1), opacity .25s;
      }
    }
    .modal-overlay.open .modal-sheet {
      transform: translateY(0);
    }
    @media(min-width:600px) {
      .modal-overlay.open .modal-sheet {
        transform: translate(-50%,-50%) scale(1);
        opacity: 1;
      }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border2); border-radius: 99px;
      margin: 12px auto 0;
    }
    @media(min-width:600px) { .modal-handle { display: none; } .modal-sheet { max-width: 520px; width: 100%; border-radius: 16px; } .modal-overlay.open { align-items: center; } }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--surface); z-index: 5;
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 800; color: var(--txt);
      display: flex; align-items: center; gap: 8px;
    }
    .modal-close {
      width: 30px; height: 30px;
      background: var(--surface2); border: none; border-radius: 99px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--txt2); font-size: 14px;
    }
    .modal-body { padding: 16px 18px 20px; }

    /* ═══════════════════════════════════════════
       HISTORY MODAL (side panel)
    ═══════════════════════════════════════════ */
    .history-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      display: none;
    }
    .history-overlay.open { display: block; }
    .history-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: min(340px, 100vw);
      background: var(--surface);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.16,1,.3,1);
    }
    .history-overlay.open .history-panel { transform: translateX(0); }
    .history-header {
      background: var(--header-bg);
      padding: max(1.2rem, env(safe-area-inset-top)) 1.25rem 1.25rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .history-list {
      flex: 1; overflow-y: auto;
      padding: 12px;
      background: var(--bg);
      transition: background .3s;
    }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 12px 14px;
      margin-bottom: 8px; cursor: pointer;
      transition: border-color .2s, background .3s;
    }
    .history-item:hover { border-color: var(--accent); }
    .history-item-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 4px;
    }
    .history-item-name { font-weight: 700; font-size: 13px; color: var(--txt); }
    .history-item-val  { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800; color: var(--accent); }
    .history-item-meta {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--txt3);
    }
    /* warranty badge on history */
    .w-badge {
      display: inline-block;
      font-size: 9px; font-weight: 700;
      padding: 2px 7px; border-radius: 99px;
    }
    .wb-ok   { background: rgba(34,197,94,.12);  color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
    .wb-warn { background: rgba(249,115,22,.12); color: #fb923c; border: 1px solid rgba(249,115,22,.2); }
    .wb-exp  { background: rgba(239,68,68,.12);  color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .history-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    /* ═══════════════════════════════════════════
       SETTINGS SECTION CARDS
    ═══════════════════════════════════════════ */
    .settings-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px; margin-bottom: 12px;
      transition: background .3s;
    }
    .settings-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--txt3); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    /* Dark mode toggle */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
    }
    .toggle-info-label { font-size: 13px; font-weight: 600; color: var(--txt); }
    .toggle-info-sub   { font-size: 10px; color: var(--txt3); margin-top: 1px; }
    .toggle-switch {
      width: 48px; height: 26px;
      background: var(--border2);
      border-radius: 99px;
      position: relative; cursor: pointer;
      transition: background .25s;
      flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--accent); box-shadow: 0 0 12px rgba(59,130,246,.35); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      transition: left .25s;
    }
    .toggle-switch.on .toggle-thumb { left: 25px; }

    /* Client autocomplete */
    .autocomplete-list {
      position: absolute; left: 0; right: 0;
      top: calc(100% + 2px); z-index: 99;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      display: none;
    }
    .autocomplete-list.show { display: block; }
    .autocomplete-item {
      padding: 10px 14px; cursor: pointer;
      font-size: 13px; color: var(--txt);
      display: flex; align-items: center; gap: 8px;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .autocomplete-item:last-child { border: none; }
    .autocomplete-item:hover { background: var(--surface2); }
    .autocomplete-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent-g);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }

    /* Expired warranty list */
    .expired-item {
      background: rgba(239,68,68,.06);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 14px; padding: 12px 14px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .expired-icon {
      width: 32px; height: 32px;
      background: rgba(239,68,68,.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .expired-name { font-size: 12px; font-weight: 700; color: var(--txt); }
    .expired-date { font-size: 10px; color: #f87171; font-weight: 600; margin-top: 1px; }
    .expired-days {
      margin-left: auto;
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 800; color: #f87171;
    }

    /* Affilate button */
    .affiliate-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
      border-radius: var(--radius); text-decoration: none;
      box-shadow: 0 4px 16px rgba(37,99,235,.3);
      margin-bottom: 16px;
      transition: box-shadow .2s, transform .15s;
      border: 1px solid rgba(59,130,246,.3);
    }
    .affiliate-btn:active { transform: scale(.98); }

    /* Sections title inside body */
    .body-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--txt3);
      text-align: center; padding: 8px 0; margin: 8px 0;
    }

    /* PDF area */
    #printable-area { display: none; }
    @media print {
      body * { visibility: hidden; }
      #printable-area, #printable-area * { visibility: visible; }
      #printable-area {
        position: absolute; left: 0; top: 0; width: 100%;
        background: white; display: block !important;
      }
      @page { margin: 1cm; size: A4; }
    }

    /* Loader */
    .loader {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast notification */
    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px);
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--txt); color: var(--bg);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      padding: 10px 20px; border-radius: 99px;
      box-shadow: var(--shadow-lg); z-index: 999;
      transition: transform .3s cubic-bezier(.16,1,.3,1);
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Warranty alert badge on header */
    .alert-dot {
      position: absolute; top: -3px; right: -3px;
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      border: 2px solid var(--header-bg);
      display: none;
    }
    .alert-dot.show { display: block; }

    /* ════════════════════════════
       SVG icons inline helper
    ════════════════════════════ */
    .ico { display:inline-block; width:1em; height:1em; vertical-align:-.125em; fill:currentColor; }

.acc-body.open{max-height:9999px}

/* ── Item row ── */
.acc-item-row{display:flex;align-items:center;gap:8px;padding:10px 16px 10px 56px;border-top:1px solid var(--border,#1c2a40);transition:background .15s;cursor:default}
.acc-item-row:hover{background:rgba(59,130,246,.03)}
.air-name{flex:1;font-size:13px;font-weight:600;color:var(--txt,#e8edf5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.air-val{font-size:12px;font-weight:700;color:var(--txt2,#7a8fa8);flex-shrink:0;min-width:48px;text-align:right;cursor:pointer;padding:2px 6px;border-radius:6px;transition:background .15s}
.air-val:hover{background:rgba(59,130,246,.1);color:#60a5fa}
.air-val-input{font-size:12px;font-weight:700;color:var(--accent,#3b82f6);background:var(--bg,#080c14);border:1.5px solid rgba(59,130,246,.4);border-radius:6px;padding:2px 6px;width:64px;outline:none;text-align:right;font-family:'Plus Jakarta Sans',sans-serif}
.air-del{font-size:16px;color:var(--txt3,#3a4a5e);cursor:pointer;background:none;border:none;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0}
.air-del:hover{color:#ef4444}
.air-custom-badge{font-size:8px;font-weight:700;letter-spacing:.06em;color:#4ade80;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.2);padding:1px 5px;border-radius:4px;flex-shrink:0;font-family:'Clash Display',sans-serif}

/* ── Add row ── */
.acc-add-row{display:flex;align-items:center;gap:6px;padding:8px 16px 10px 56px;border-top:1px dashed var(--border,#1c2a40);background:rgba(59,130,246,.02)}
.acc-add-inp{flex:1;padding:8px 10px;background:var(--bg,#080c14);border:1.5px solid var(--border,#1c2a40);border-radius:9px;font-size:12px;color:var(--txt,#e8edf5);outline:none;font-family:'Plus Jakarta Sans',sans-serif;transition:border-color .2s}
.acc-add-inp:focus{border-color:rgba(59,130,246,.4)}
.acc-add-inp::placeholder{color:var(--txt3,#3a4a5e)}
.acc-val-inp{width:64px;padding:8px 6px;background:var(--bg,#080c14);border:1.5px solid var(--border,#1c2a40);border-radius:9px;font-size:12px;font-weight:700;color:var(--txt,#e8edf5);outline:none;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;transition:border-color .2s}
.acc-val-inp:focus{border-color:rgba(59,130,246,.4)}
.acc-add-btn{width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,.15);color:var(--accent,#3b82f6);border:1.5px solid rgba(59,130,246,.2);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1}
.acc-add-btn:hover{background:rgba(59,130,246,.25);transform:scale(1.08)}
.acc-add-btn:active{transform:scale(.92)}

/* ── Empty state ── */
.acc-empty{padding:10px 16px 12px 56px;font-size:12px;color:var(--txt3,#3a4a5e);font-style:italic}

/* ── Save button ── */
.save-section{padding:16px}
.save-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent2,#f97316),#ea580c);color:#fff;font-family:'Clash Display',sans-serif;font-size:14px;font-weight:700;border-radius:13px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 5px 20px rgba(249,115,22,.35);transition:all .2s}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(249,115,22,.4)}
.save-btn:active{transform:scale(.98)}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:8px;padding:10px 12px;margin:0 0 2px}
.stat-pill{flex:1;background:var(--bg,#080c14);border:1px solid var(--border,#1c2a40);border-radius:10px;padding:8px 10px;text-align:center}
.stat-num{font-family:'Clash Display',sans-serif;font-size:16px;font-weight:700;color:var(--txt,#e8edf5)}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3,#3a4a5e);margin-top:2px}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#f1f5f9;color:#0f172a;font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:99px;box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:999;transition:transform .3s cubic-bezier(.16,1,.3,1);white-space:nowrap;pointer-events:none}

/* ── Misc ── */
.divider{height:6px;background:var(--bg,#080c14);border-top:1px solid var(--border,#1c2a40);border-bottom:1px solid var(--border,#1c2a40)}
</style>
</head>

// Catalog state (copies so we can edit without touching originals)
let srvCatalog = SRV.map(s => ({...s}));
let matCatalog = MAT.map(m => ({...m}));

// Category config
const SRV_CATS = [
  {k:'res', icon:'🏠', name:'Residencial'},
  {k:'com', icon:'🏢', name:'Comercial'},
  {k:'ind', icon:'🏭', name:'Industrial'},
  {k:'ate', icon:'🌍', name:'Aterramento'},
  {k:'ar',  icon:'❄️', name:'Ar-condicionado'},
  {k:'man', icon:'🔧', name:'Manutenção'},
  {k:'inf', icon:'🏗️', name:'Infraestrutura'},
  {k:'seg', icon:'🔒', name:'Automação / Segurança'},
];
const MAT_CATS = [
  {k:'cond', icon:'⚡', name:'Condutores'},
  {k:'prot', icon:'🛡️', name:'Proteção'},
  {k:'elet', icon:'🏗️', name:'Eletrodutos'},
  {k:'cxq',  icon:'📦', name:'Caixas / Quadros'},
  {k:'disp', icon:'🔌', name:'Dispositivos'},
  {k:'ilu',  icon:'💡', name:'Iluminação'},
  {k:'ate',  icon:'🌍', name:'Aterramento / SPDA'},
  {k:'fix',  icon:'🔩', name:'Fixação / Acessórios'},
];

// Track which accordions are open
const openCats = new Set();
// Track custom-added items
const customItems = new Set();

// ─── RENDER ACCORDION ─────────────────────────────────
function renderAccordion(containerId, catalog, cats, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  cats.forEach(cat => {
    const items = catalog.filter(i => i.cat === cat.k);
    const isOpen = openCats.has(type + '-' + cat.k);

    const catDiv = document.createElement('div');
    catDiv.className = 'acc-cat';
    catDiv.dataset.cat = cat.k;
    catDiv.dataset.type = type;

    // header
    const hdr = document.createElement('div');
    hdr.className = 'acc-hdr';
    const customCount = items.filter(i => customItems.has(i._id)).length;
    hdr.innerHTML = `
      <span class="acc-cat-icon">${cat.icon}</span>
      <span class="acc-cat-name">${cat.name}</span>
      <span class="acc-cat-count${customCount?' has-custom':''}">${items.length}</span>
      <svg class="acc-arr${isOpen?' open':''}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    `;
    hdr.addEventListener('click', () => toggleCat(type + '-' + cat.k, containerId, catalog, cats, type));

    // body
    const body = document.createElement('div');
    body.className = 'acc-body' + (isOpen ? ' open' : '');
    body.id = `acc-body-${type}-${cat.k}`;

    // items
    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'acc-empty';
      empty.textContent = 'Nenhum item nesta categoria.';
      body.appendChild(empty);
    } else {
      items.forEach(item => {
        body.appendChild(buildItemRow(item, type, containerId, catalog, cats));
      });
    }

    // add row
    body.appendChild(buildAddRow(cat, type, containerId, catalog, cats));

    catDiv.appendChild(hdr);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });

  updateStats();
}

function buildItemRow(item, type, containerId, catalog, cats) {
  const row = document.createElement('div');
  row.className = 'acc-item-row';
  row.dataset.itemId = item._id || '';

  const isCustom = customItems.has(item._id);
  const priceKey = type === 'srv' ? 'v' : 'p';
  const price = item[priceKey];
  const priceStr = type === 'srv' ? 'R$ ' + price : (price < 10 ? 'R$ ' + price.toFixed(2).replace('.',',') : 'R$ ' + price);

  const nm = document.createElement('span');
  nm.className = 'air-name';
  nm.textContent = item.icon + ' ' + item.n;

  const vl = document.createElement('span');
  vl.className = 'air-val';
  vl.textContent = priceStr;
  vl.title = 'Clique para editar o valor';
  vl.addEventListener('click', () => editValue(vl, item, priceKey, type, containerId, catalog, cats));

  const del = document.createElement('button');
  del.className = 'air-del';
  del.innerHTML = '&times;';
  del.title = 'Remover do catálogo';
  del.addEventListener('click', () => {
    if (!confirm('Remover "' + item.n + '" do catálogo?')) return;
    const idx = catalog.indexOf(item);
    if (idx > -1) catalog.splice(idx, 1);
    customItems.delete(item._id);
    renderAccordion(containerId, catalog, cats, type);
    showToast('Removido: ' + item.n);
  });

  row.appendChild(nm);
  if (isCustom) {
    const badge = document.createElement('span');
    badge.className = 'air-custom-badge';
    badge.textContent = 'NOVO';
    row.appendChild(badge);
  }
  row.appendChild(vl);
  row.appendChild(del);
  return row;
}

function buildAddRow(cat, type, containerId, catalog, cats) {
  const row = document.createElement('div');
  row.className = 'acc-add-row';

  const nameInp = document.createElement('input');
  nameInp.className = 'acc-add-inp';
  nameInp.placeholder = type === 'srv' ? '+ Nome do serviço' : '+ Nome do material';

  const valInp = document.createElement('input');
  valInp.className = 'acc-val-inp';
  valInp.type = 'number';
  valInp.placeholder = 'R$';
  valInp.min = '0';

  const btn = document.createElement('button');
  btn.className = 'acc-add-btn';
  btn.textContent = '+';
  btn.title = 'Adicionar à categoria ' + cat.name;

  btn.addEventListener('click', () => {
    const n = nameInp.value.trim();
    const v = parseFloat(valInp.value);
    if (!n) { showToast('⚠️ Digite o nome'); nameInp.focus(); return; }
    if (!v || v <= 0) { showToast('⚠️ Digite um valor'); valInp.focus(); return; }
    const newItem = type === 'srv'
      ? { n, v, cat: cat.k, icon: '⚡', _id: 'custom_' + Date.now() }
      : { n, p: v, t: '', cat: cat.k, icon: '⚡', _id: 'custom_' + Date.now() };
    catalog.push(newItem);
    customItems.add(newItem._id);
    nameInp.value = '';
    valInp.value = '';
    openCats.add(type + '-' + cat.k);
    renderAccordion(containerId, catalog, cats, type);
    showToast('✅ Adicionado: ' + n);
  });

  // Enter key support
  [nameInp, valInp].forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  });

  row.appendChild(nameInp);
  row.appendChild(valInp);
  row.appendChild(btn);
  return row;
}

function editValue(el, item, priceKey, type, containerId, catalog, cats) {
  const currentVal = item[priceKey];
  const inp = document.createElement('input');
  inp.className = 'air-val-input';
  inp.type = 'number';
  inp.value = currentVal;
  inp.min = '0';
  el.replaceWith(inp);
  inp.focus();
  inp.select();

  const save = () => {
    const newVal = parseFloat(inp.value);
    if (!isNaN(newVal) && newVal >= 0) {
      item[priceKey] = newVal;
      showToast('💾 Valor atualizado');
    }
    renderAccordion(containerId, catalog, cats, type);
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = currentVal; inp.blur(); }
  });
}

function toggleCat(key, containerId, catalog, cats, type) {
  if (openCats.has(key)) openCats.delete(key);
  else openCats.add(key);
  renderAccordion(containerId, catalog, cats, type);
}

// ─── SEARCH ───────────────────────────────────────────
function searchCatalog(type, query) {
  const q = query.toLowerCase().trim();
  const containerId = type === 'srv' ? 'srv-accordion' : 'mat-accordion';
  const catalog = type === 'srv' ? srvCatalog : matCatalog;
  const cats = type === 'srv' ? SRV_CATS : MAT_CATS;

  if (!q) {
    renderAccordion(containerId, catalog, cats, type);
    return;
  }

  // Filter and auto-open matching cats
  const matched = catalog.filter(i => i.n.toLowerCase().includes(q));
  const matchedCats = new Set(matched.map(i => i.cat));
  matchedCats.forEach(c => openCats.add(type + '-' + c));

  // Rebuild with filtered items per category
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  cats.forEach(cat => {
    const items = catalog.filter(i => i.cat === cat.k && i.n.toLowerCase().includes(q));
    if (!items.length) return;

    const catDiv = document.createElement('div');
    catDiv.className = 'acc-cat';

    const hdr = document.createElement('div');
    hdr.className = 'acc-hdr';
    hdr.innerHTML = `<span class="acc-cat-icon">${cat.icon}</span><span class="acc-cat-name">${cat.name}</span><span class="acc-cat-count">${items.length}</span>`;

    const body = document.createElement('div');
    body.className = 'acc-body open';
    items.forEach(item => body.appendChild(buildItemRow(item, type, containerId, catalog, cats)));

    catDiv.appendChild(hdr);
    catDiv.appendChild(body);
    container.appendChild(catDiv);
  });

  if (!container.children.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--txt3)">Nenhum resultado para "' + query + '"</div>';
  }
}

// ─── STATS ────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-srv').textContent = srvCatalog.length;
  document.getElementById('stat-mat').textContent = matCatalog.length;
  document.getElementById('stat-custom').textContent = customItems.size;
}

// ─── SAVE ─────────────────────────────────────────────
function saveCatalog() {
  showToast('✅ Catálogo salvo! (' + srvCatalog.length + ' serviços + ' + matCatalog.length + ' materiais)');
}

// ─── TOAST ────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => t.style.transform = 'translateX(-50%) translateY(80px)', 2200);
}

// ─── INIT ─────────────────────────────────────────────
// Add _id to all items
srvCatalog.forEach((s, i) => s._id = 'srv_' + i);
matCatalog.forEach((m, i) => m._id = 'mat_' + i);

// Open first category by default
openCats.add('srv-res');

renderAccordion('srv-accordion', srvCatalog, SRV_CATS, 'srv');
renderAccordion('mat-accordion', matCatalog, MAT_CATS, 'mat');
</script>
</body>
